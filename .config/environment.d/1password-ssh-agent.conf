# Point SSH_AUTH_SOCK at 1Password's SSH agent, session-wide.
#
# Plasma's /etc/xdg/plasma-workspace/env/ssh-agent.sh only claims SSH_AUTH_SOCK
# when it is empty, so setting it here wins and Plasma's own (keyless) ssh-agent
# stays out of the way. ~/.ssh/config's IdentityAgent redirects ssh(1) alone;
# this also covers everything that reads SSH_AUTH_SOCK directly (VS Code,
# JetBrains, Go/Rust tooling), including GUI apps, which never source the shell
# config. Read only when the systemd user manager starts: re-login to apply.
# Inert on macOS - nothing there reads environment.d.
SSH_AUTH_SOCK=${HOME}/.1password/agent.sock
