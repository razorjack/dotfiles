# Per-application keyd overrides, read by keyd-application-mapper.
#
# !! NOT ACTIVE ON KDE PLASMA 6 WAYLAND !! keyd-application-mapper cannot detect
# the focused window there (only X11 / GNOME-Wayland / Sway work - keyd #694).
# On this setup (KDE Wayland) terminal copy/paste is handled terminal-side
# instead: Ghostty `performable:ctrl+c=copy_to_clipboard` + `ctrl+v=paste` and
# kitty `copy_or_interrupt` / `paste_from_clipboard`. This file is kept only for
# a possible future X11 or GNOME session, where the mapper does work.
#
# Section name = the window app-id/class; find it with keyd-application-mapper -l.

[com.mitchellh.ghostty]
meta.c = C-S-c
meta.v = C-S-v
meta.x = C-S-x

[kitty]
meta.c = C-S-c
meta.v = C-S-v
meta.x = C-S-x
