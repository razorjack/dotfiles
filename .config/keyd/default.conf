# keyd base config. Deployed to /etc/keyd/default.conf by setup_linux; the
# source of truth is versioned here in the dotfiles repo (XDG path).
#
# keyd remaps at the evdev/uinput level, below the display server, so this one
# file applies identically in Wayland, X11, the TTY and every app.
#
# Two muscle-memory transfers from the macOS / Karabiner setup:
#   1. Caps Lock -> Control.
#   2. macOS-style Super+C / Super+V / Super+X for copy / paste / cut, made
#      universal. Terminals need Ctrl+Shift+C/V instead of Ctrl+C/V, so the
#      per-app overrides live in ~/.config/keyd/app.conf (applied by the
#      keyd-application-mapper user service).

[ids]
*

[main]
# Caps Lock acts as Control. For the vim-friendly dual role (Esc when tapped,
# Control when held) use instead:  capslock = overload(control, esc)
capslock = control

# The built-in [meta] layer overrides ONLY these keys while Super is held.
# Every other Super combo (the Meta launcher tap, Meta+E, KDE tiling shortcuts)
# passes straight through to Plasma untouched.
[meta]
c = C-c
v = C-v
x = C-x
# Optional extras (uncomment if you want them; both collide with terminal
# meanings, so they rely on the app.conf overrides to stay sane in a terminal):
# a = C-a
# z = C-z

# ---------------------------------------------------------------------------
# Fallback if keyd-application-mapper turns out to be flaky on Plasma 6 Wayland:
# drop the [meta] block above and use dedicated clipboard keysyms instead, which
# never collide with Ctrl+C (SIGINT) so no per-app overrides are needed. Then
# bind XF86Copy/XF86Paste in the terminal's own config.
#
# [meta]
# c = copy
# v = paste
# x = cut
# ---------------------------------------------------------------------------
